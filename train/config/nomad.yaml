project_name: nomad_recon_future
run_name: nomad_recon_future

# training setup
use_wandb: False # set to true if you want to log to wandb
train: True
batch_size: 8
eval_batch_size: 8
epochs: 100
gpu_ids: [0]
num_workers: 4
lr: 1e-4
optimizer: adamw
clipping: False
max_norm: 1.
scheduler: "cosine"
warmup: True 
warmup_epochs: 4
cyclic_period: 10
plateau_patience: 3
plateau_factor: 0.5
seed: 0

# model params
model_type: nomad
vision_encoder: nomad_vint
encoding_size: 256
obs_encoder: efficientnet-b0
attn_unet: False
cond_predict_scale: False
mha_num_attention_heads: 4
mha_num_attention_layers: 4
mha_ff_dim_factor: 4
down_dims: [64, 128, 256]

# diffusion model params
num_diffusion_iters: 10

# mask 
goal_mask_prob: 0.5

# normalization for the action space
normalize: True

# context
context_type: temporal
context_size: 3 # 5
alpha: 1e-4

# distance bounds for distance and action and distance predictions 
distance:
  min_dist_cat: 0
  max_dist_cat: 20
action:
  min_dist_cat: 3
  max_dist_cat: 20

# action output params
len_traj_pred: 8
learn_angle: False

# dataset specific parameters
image_size: [96, 96] # width, height
future_prediction:
  enabled: True
  horizon: 1
  spacing: null
  encoding_size: 128
  loss_weight: 0.1
  predict_deltas: True
  detach_anchor: True
  target: after_action_horizon # first future frame after len_traj_pred actions

datasets:
  recon:
    data_folder: ~/autodl-tmp/recon_release
    processed_data_folder: ~/autodl-tmp/recon_processed
    auto_process: True
    auto_split: True
    split: 0.8
    split_seed: 0
    # Uncomment to load fewer trajectories while debugging.
    # max_train_trajs: 100
    # max_test_trajs: 20
    train: vint_train/data/data_splits/recon/train/ # created automatically if missing
    test: vint_train/data/data_splits/recon/test/ # created automatically if missing
    end_slack: 3 # because many trajectories end in collisions
    goals_per_obs: 1 # how many goals are sampled per observation
    negative_mining: True # negative mining from the ViNG paper (Shah et al.)
  # private datasets (uncomment if you have access)
  # seattle:
  #   data_folder: /home/<username>/nomad_dataset/seattle/
  #   train: /home/<username>/data_splits/seattle/train/
  #   test: /home/<username>/data_splits/seattle/test/
  #   end_slack: 0
  #   goals_per_obs: 1
  #   negative_mining: True
  # scand:
  #   data_folder: /home/<username>/nomad_dataset/scand/
  #   train: /home/<username>/data_splits/scand/train/
  #   test: /home/<username>/data_splits/scand/test/
  #   end_slack: 0
  #   goals_per_obs: 1
  #   negative_mining: True

# logging stuff
## =0 turns off
print_log_freq: 100 # in iterations
image_log_freq: 0 # in iterations
num_images_log: 0
pairwise_test_freq: 0 # in epochs
eval_fraction: 0.1
wandb_log_freq: 10 # in iterations
eval_freq: 1 # in epochs
